<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Plumber Kart 3D</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div id="top-bar">
            <div class="logo">PLUMBER KART</div>
            <div id="player-count">🏁 1st Place</div>
        </div>

        <div id="mobile-controls">
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
            <button id="jump-btn">USE ITEM</button>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Trash talk..." maxlength="50">
        </div>

        <div id="instructions">
            <div class="instruction-box">
                <h1>SUPER PLUMBER KART</h1>
                <p>WASD to Drive | SPACE for Jump</p>
                <p>MOBILE: Joystick & Yellow Button</p>
                <button id="start-btn">RACE!</button>
            </div>
        </div>
    </div>
    <script src="src/world.js"></script>
    <script src="src/player.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
